project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/"
    - "!zh/"
  resources:
    - assets/data/visitor-locations.json

website:
  title: "Zheng Zhou | Statistics PhD Student | Tsinghua University"
  site-url: "https://zhouzheng-stat01.github.io"
  description: "Academic homepage of Zheng Zhou, Ph.D. student in Statistics at Qiuzhen College, Tsinghua University. Research interests include statistics, machine learning, conformal prediction, causal inference, and quantitative finance."
  navbar:
    pinned: true
    left:
      - text: Home
        href: index.qmd
      - text: Publications
        href: publications.qmd
      - text: Blog
        href: blog.qmd
      - text: Links
        href: links.qmd
    right:
      - text: 中文
        href: zh/
      - icon: github
        href: https://github.com/ZhouZheng-Stat01
        aria-label: GitHub
      - icon: envelope
        href: mailto:zhouz23@mails.tsinghua.edu.cn
        aria-label: Email
  page-footer:
    left: "© 2026 Zheng Zhou"
    center: '<span class="site-last-updated">Last updated: <span data-last-updated data-locale="en"></span> (Beijing time)</span>'
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme:
      - cosmo
      - assets/styles/styles.scss
    include-in-header:
      - assets/includes/goatcounter.html
      - assets/includes/language-switch.html
      - assets/includes/footer-updated.html
      - assets/includes/visitor-map.html
    toc: true
    toc-location: right
    smooth-scroll: true
    link-external-newwindow: true
    code-copy: true

execute:
  freeze: auto
