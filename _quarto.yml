project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/"
    - "!zh/"
  resources:
    - files/visitor-locations.json

website:
  title: "Zheng Zhou"
  site-url: "https://ZhouZheng-Stat01.github.io"
  description: "Academic homepage of Zheng Zhou"
  navbar:
    pinned: true
    left:
      - text: Home
        href: index.qmd
      - text: Publications
        href: publications.qmd
      - text: Blog
        href: blog.qmd
      - text: Links
        href: links.qmd
    right:
      - text: 中文
        href: zh/
      - icon: github
        href: https://github.com/ZhouZheng-Stat01
        aria-label: GitHub
      - icon: envelope
        href: mailto:zhouz23@mails.tsinghua.edu.cn
        aria-label: Email
  page-footer:
    left: "© 2026 Zheng Zhou"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme:
      - cosmo
      - styles/styles.scss
    include-in-header:
      - includes/goatcounter.html
      - includes/language-switch.html
      - includes/visitor-map.html
    toc: true
    toc-location: right
    smooth-scroll: true
    link-external-newwindow: true
    code-copy: true

execute:
  freeze: auto
