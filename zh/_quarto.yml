project:
  type: website
  output-dir: ../_site/zh
  render:
    - "*.qmd"
    - "posts/"
  resources:
    - ../assets/data/visitor-locations.json

website:
  title: "周正"
  site-url: "https://zhouzheng-stat01.github.io/zh"
  description: "周正的中文学术主页。周正是清华大学求真书院统计学博士生，研究兴趣包括统计学、机器学习、共形预测、因果推断和量化金融。"
  navbar:
    pinned: true
    left:
      - text: 首页
        href: index.qmd
      - text: 论文
        href: publications.qmd
      - text: 博客
        href: blog.qmd
      - text: 链接
        href: links.qmd
    right:
      - text: English
        href: ../index.html
      - icon: github
        href: https://github.com/ZhouZheng-Stat01
        aria-label: GitHub
      - icon: envelope
        href: mailto:zhouz23@mails.tsinghua.edu.cn
        aria-label: Email
  page-footer:
    left: "© 2026 周正"
    center: '<span class="site-last-updated">最近更新：<span data-last-updated data-locale="zh-CN"></span>（北京时间）</span>'
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme:
      - cosmo
      - ../assets/styles/styles.scss
    include-in-header:
      - ../assets/includes/goatcounter.html
      - ../assets/includes/language-switch.html
      - ../assets/includes/footer-updated.html
      - ../assets/includes/visitor-map.html
    toc: true
    toc-location: right
    smooth-scroll: true
    link-external-newwindow: true
    code-copy: true

execute:
  freeze: auto
