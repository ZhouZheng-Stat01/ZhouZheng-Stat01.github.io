project:
  type: website
  output-dir: ../_site/zh
  render:
    - "*.qmd"
    - "posts/"
  resources:
    - ../files/visitor-locations.json

website:
  title: "周正"
  site-url: "https://ZhouZheng-Stat01.github.io/zh"
  description: "周正的中文学术主页"
  navbar:
    pinned: true
    left:
      - text: 首页
        href: index.qmd
      - text: 论文
        href: publications.qmd
      - text: 博客
        href: blog.qmd
      - text: 链接
        href: links.qmd
    right:
      - text: English
        href: ../index.html
      - icon: github
        href: https://github.com/ZhouZheng-Stat01
        aria-label: GitHub
      - icon: envelope
        href: mailto:zhouz23@mails.tsinghua.edu.cn
        aria-label: Email
  page-footer:
    left: "© 2026 周正"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme:
      - cosmo
      - ../styles/styles.scss
    include-in-header:
      - ../includes/goatcounter.html
      - ../includes/language-switch.html
      - ../includes/visitor-map.html
    toc: true
    toc-location: right
    smooth-scroll: true
    link-external-newwindow: true
    code-copy: true

execute:
  freeze: auto
