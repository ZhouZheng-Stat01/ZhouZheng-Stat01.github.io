<script>
document.addEventListener("DOMContentLoaded", function() {
  const targets = document.querySelectorAll("[data-last-updated]");
  if (!targets.length || !document.lastModified) return;

  const updatedAt = new Date(document.lastModified);
  if (Number.isNaN(updatedAt.getTime())) return;

  targets.forEach(function(target) {
    const locale = target.getAttribute("data-locale") || document.documentElement.lang || "en";
    const formatted = new Intl.DateTimeFormat(locale, {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }).format(updatedAt);

    target.textContent = formatted;
  });
});
</script>
